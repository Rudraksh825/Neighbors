<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nn-chain-explorer</title>
<style>
/* ── CSS custom properties — dark theme (default) ── */
:root {
  --bg:          #1a1b1e;
  --bg-panel:    #212124;
  --bg-chart:    #18191c;
  --border:      #3a3a3d;
  --text:        #ececec;
  --text-muted:  #8e8ea0;
  --text-dim:    #56566a;
  --accent:      #c47e3a;
  --accent-soft: #3a3020;
  --btn-bg:      #2a2a2e;
  --btn-active:  #c47e3a;
  --btn-active-border: #d99050;
  --btn-hover:   #333338;
  --link-stroke: #5a5a6e;
  --link-arrow:  #5a5a6e;
  --cycle-ring:  #d4a843;
  --chain-arrow-color: #6a6a7e;
  --cycle-marker-color: #d4a843;
  --select-bg:   #2a2a2e;
  --overlay-bg:  #1a1b1e;
  --spinner-track: #3a3a3d;
  --spinner-head:  #c47e3a;
  --hist-bar:    #7a6fbd;
  --hist-hub:    #c47e3a;
  --axis-line:   #4a4a5a;
  --axis-text:   #7a7a8e;
}

/* ── Light theme overrides ── */
body.light {
  --bg:          #f5f0e8;
  --bg-panel:    #ede8df;
  --bg-chart:    #e8e2d8;
  --border:      #c8bfb0;
  --text:        #2a2520;
  --text-muted:  #6b6258;
  --text-dim:    #a09080;
  --accent:      #8b5e3c;
  --accent-soft: #e8ddd0;
  --btn-bg:      #ddd8cf;
  --btn-active:  #8b5e3c;
  --btn-active-border: #a07050;
  --btn-hover:   #d0cac0;
  --link-stroke: #a09080;
  --link-arrow:  #a09080;
  --cycle-ring:  #b8860b;
  --chain-arrow-color: #908070;
  --cycle-marker-color: #b8860b;
  --select-bg:   #ddd8cf;
  --overlay-bg:  #f5f0e8;
  --spinner-track: #c8bfb0;
  --spinner-head:  #8b5e3c;
  --hist-bar:    #7a6a5a;
  --hist-hub:    #8b5e3c;
  --axis-line:   #b0a898;
  --axis-text:   #7a6a58;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.2s, color 0.2s;
}

#header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
}
#header h1 { font-size: 14px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; }

.model-btn {
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--btn-bg);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.model-btn.active { background: var(--btn-active); border-color: var(--btn-active-border); color: #fff; }
.model-btn:hover:not(.active) { background: var(--btn-hover); }

#color-select {
  padding: 4px 8px;
  background: var(--select-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  font-size: 12px;
}

.sep { width: 1px; height: 20px; background: var(--border); }

#theme-toggle {
  margin-left: auto;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--btn-bg);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  transition: background 0.15s;
}
#theme-toggle:hover { background: var(--btn-hover); }

#loading-overlay, #error-overlay {
  position: fixed; inset: 0;
  background: var(--overlay-bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 16px;
}
#error-overlay { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--spinner-track);
  border-top-color: var(--spinner-head);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box {
  background: var(--bg-panel);
  border: 1px solid #c0392b;
  border-radius: 8px;
  padding: 24px 32px;
  max-width: 500px;
  text-align: center;
}
.error-box h2 { color: #e74c3c; margin-bottom: 12px; }
.error-box code { background: var(--bg); padding: 2px 6px; border-radius: 3px; font-size: 13px; color: var(--accent); }

#main { display: flex; flex: 1; overflow: hidden; }
#graph-container { flex: 1; position: relative; overflow: hidden; }
svg#graph { width: 100%; height: 100%; }

#tooltip {
  position: absolute;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 12px;
  pointer-events: none;
  display: none;
  max-width: 180px;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
#tooltip img { width: 64px; height: 64px; display: block; margin-bottom: 6px; border-radius: 3px; }
#tooltip .tt-path { color: var(--text-muted); font-size: 10px; word-break: break-all; }
#tooltip .tt-class { color: var(--accent); font-weight: 600; }
#tooltip .tt-hub { color: var(--cycle-ring); }

#stats-panel {
  width: 300px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
  flex-shrink: 0;
}
#stats-panel h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin: 12px 0 8px;
}
#stats-panel h3:first-child { margin-top: 0; }
.chart-container { background: var(--bg-chart); border-radius: 4px; padding: 4px; margin-bottom: 8px; }

.hub-gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
.hub-thumb { position: relative; cursor: pointer; }
.hub-thumb img { width: 100%; aspect-ratio: 1; display: block; border-radius: 3px; }
.hub-thumb img:hover { outline: 2px solid var(--accent); }
.hub-thumb .hub-score {
  position: absolute; bottom: 1px; right: 2px;
  font-size: 9px; color: #fff;
  background: rgba(0,0,0,0.65);
  padding: 1px 3px; border-radius: 2px;
}

#chain-inspector {
  height: 110px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  padding: 8px 12px;
  overflow-x: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
#chain-inspector .ci-empty { color: var(--text-dim); font-size: 13px; }
.chain-node { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.chain-node img { width: 64px; height: 64px; border-radius: 4px; border: 2px solid transparent; }
.chain-node.cycle-node img { border-color: var(--cycle-ring); }
.chain-node.active img { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
.chain-arrow { color: var(--chain-arrow-color); font-size: 18px; flex-shrink: 0; }
.chain-cycle-marker { font-size: 18px; color: var(--cycle-marker-color); flex-shrink: 0; }
.chain-meta { font-size: 11px; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; align-self: flex-end; margin-left: 8px; }
.chain-meta span { color: var(--accent); }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div>Loading data.json...</div>
</div>

<div id="error-overlay">
  <div class="error-box">
    <h2 id="error-title">Error</h2>
    <p id="error-msg"></p>
  </div>
</div>

<div id="header">
  <h1>nn-chain-explorer</h1>
  <div class="sep"></div>
  <button class="model-btn active" data-model="dinov2">DINOv2</button>
  <button class="model-btn" data-model="clip">CLIP</button>
  <div class="sep"></div>
  <label style="font-size:12px;color:var(--text-muted);">Color:</label>
  <select id="color-select">
    <option value="class">Class</option>
    <option value="tau">Transient length τ</option>
    <option value="hub">Hub score</option>
  </select>
  <span id="sample-banner" style="display:none;font-size:11px;color:var(--text-muted);background:var(--accent-soft);padding:3px 8px;border-radius:4px;border:1px solid var(--border);"></span>
  <button id="theme-toggle" title="Toggle light/dark theme">☀</button>
</div>

<div id="main">
  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="tooltip">
      <img id="tt-img" src="" alt="">
      <div class="tt-class" id="tt-class"></div>
      <div class="tt-hub" id="tt-hub"></div>
      <div class="tt-path" id="tt-path"></div>
    </div>
  </div>

  <div id="stats-panel">
    <h3>τ Distribution</h3>
    <div class="chart-container"><svg id="chart-tau" width="276" height="100"></svg></div>
    <h3>Cycle Length ℓ</h3>
    <div class="chart-container"><svg id="chart-cyc" width="276" height="100"></svg></div>
    <h3>Hub In-degree (log)</h3>
    <div class="chart-container"><svg id="chart-hub" width="276" height="100"></svg></div>
    <h3>Top-10 Hub Gallery</h3>
    <div class="hub-gallery" id="hub-gallery"></div>
  </div>
</div>

<div id="chain-inspector">
  <span class="ci-empty">Click a node to inspect its chain.</span>
</div>

<script src="./d3.min.js"></script>
<script>
(function() {
'use strict';

function showError(title, msg) {
  document.getElementById('loading-overlay').style.display = 'none';
  const ov = document.getElementById('error-overlay');
  ov.style.display = 'flex';
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').innerHTML = msg;
}

// ── Color schemes ────────────────────────────────────────────────────────────

const CLASS_COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a'
];

// ── State ────────────────────────────────────────────────────────────────────

let G = null;          // loaded data.json
let activeModel = 'dinov2';
let colorMode = 'class';
let simulation = null;
let nodes = [];
let links = [];
let nodeById = {};
let animTimeout = null;

// ── Load data ────────────────────────────────────────────────────────────────

fetch('./data.json')
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    G = data;
    document.getElementById('loading-overlay').style.display = 'none';
    // Show sampling banner if dataset was subsampled
    if (data.metadata && data.metadata.sampled) {
      const banner = document.getElementById('sample-banner');
      if (banner) {
        banner.textContent =
          `Showing ${(data.metadata.viz_n || data.images.length).toLocaleString()} of ` +
          `${(data.metadata.n_images || '?').toLocaleString()} images ` +
          `(top hubs + random sample)`;
        banner.style.display = 'inline-block';
      }
    }
    init();
  })
  .catch(err => {
    showError(
      'data.json not found',
      'Run <code>python main.py export</code> first, then open this file ' +
      'from the viz/ directory or via:<br><code>python -m http.server 8080 --directory viz</code>'
    );
  });

// ── Init ─────────────────────────────────────────────────────────────────────

function getThemeColor(varName) {
  return getComputedStyle(document.body).getPropertyValue(varName).trim();
}

function init() {
  // Theme toggle
  const themeBtn = document.getElementById('theme-toggle');
  const savedTheme = localStorage.getItem('nn-theme');
  if (savedTheme === 'light') {
    document.body.classList.add('light');
    themeBtn.textContent = '☽';
  }
  themeBtn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    themeBtn.textContent = isLight ? '☽' : '☀';
    localStorage.setItem('nn-theme', isLight ? 'light' : 'dark');
    applyThemeToGraph();
    updateStats();
  });

  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeModel = btn.dataset.model;
      updateGraph();
      updateStats();
    });
  });

  document.getElementById('color-select').addEventListener('change', e => {
    colorMode = e.target.value;
    updateNodeColors();
  });

  buildGraph();
  updateStats();
}

function applyThemeToGraph() {
  if (!window._linkSel || !window._nodeSel) return;
  const linkColor = getThemeColor('--link-stroke');
  const arrowColor = getThemeColor('--link-arrow');
  const cycleRing = getThemeColor('--cycle-ring');

  window._linkSel.attr('stroke', linkColor);
  d3.select('#arrow path').attr('fill', arrowColor);
  window._nodeSel.select('circle.node-ring')
    .attr('stroke', d => d.isCycle ? cycleRing : 'none');
  updateNodeColors();
}

// ── Graph ────────────────────────────────────────────────────────────────────

function getModelData() {
  return G[activeModel];
}

function buildGraph() {
  const svg = d3.select('#graph');
  const container = document.getElementById('graph-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  svg.selectAll('*').remove();

  const md = getModelData();
  const nnMap = md.nn_map;
  const chains = md.chains;
  const inDegree = new Array(G.images.length).fill(0);
  nnMap.forEach(t => inDegree[t]++);

  const cycleNodes = new Set();
  G.images.forEach((_, i) => {
    const c = chains[String(i)];
    if (c && c.cycle_nodes) c.cycle_nodes.forEach(n => cycleNodes.add(n));
  });

  const tauVals = G.images.map((_, i) => {
    const c = chains[String(i)];
    return c ? c.transient_length : 0;
  });
  const maxTau = Math.max(...tauVals, 1);
  const maxHub = Math.max(...inDegree, 1);

  const classNames = [...new Set(G.images.map(im => im.class))].sort();
  const classIdx = {};
  classNames.forEach((c, i) => classIdx[c] = i);

  nodeById = {};
  nodes = G.images.map((im, i) => {
    const n = {
      id: i,
      path: im.path,
      cls: im.class,
      clsIdx: classIdx[im.class] ?? 0,
      thumbnail: im.thumbnail,
      hub: inDegree[i],
      tau: tauVals[i],
      isCycle: cycleNodes.has(i),
      x: W / 2 + (Math.random() - 0.5) * W * 0.8,
      y: H / 2 + (Math.random() - 0.5) * H * 0.8,
    };
    nodeById[i] = n;
    return n;
  });

  links = nnMap.map((target, source) => ({ source, target }));

  const rScale = d3.scaleSqrt().domain([0, maxHub]).range([4, 18]);

  // SVG layers
  const zoomG = svg.append('g').attr('id', 'zoom-g');
  const linkG = zoomG.append('g').attr('id', 'links');
  const nodeG = zoomG.append('g').attr('id', 'nodes');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.1, 8]).on('zoom', e => {
    zoomG.attr('transform', e.transform);
  }));

  const linkColor = getThemeColor('--link-stroke');
  const arrowColor = getThemeColor('--link-arrow');
  const cycleRingColor = getThemeColor('--cycle-ring');

  // Draw links (arrows)
  svg.append('defs').append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 14)
    .attr('refY', 0)
    .attr('markerWidth', 4)
    .attr('markerHeight', 4)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', arrowColor);

  const linkSel = linkG.selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', linkColor)
    .attr('stroke-width', 0.8)
    .attr('marker-end', 'url(#arrow)')
    .attr('opacity', 0.7);

  // Draw nodes
  const nodeSel = nodeG.selectAll('g.node')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('mouseover', onNodeHover)
    .on('mousemove', onNodeMouseMove)
    .on('mouseout', onNodeOut)
    .on('click', onNodeClick);

  nodeSel.append('circle')
    .attr('class', 'node-ring')
    .attr('r', d => rScale(d.hub) + 2)
    .attr('fill', 'none')
    .attr('stroke', d => d.isCycle ? cycleRingColor : 'none')
    .attr('stroke-width', 2);

  nodeSel.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => rScale(d.hub));

  updateNodeColors();

  // Simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(30).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-60))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(d => rScale(d.hub) + 3))
    .on('tick', () => {
      linkSel
        .attr('x1', d => nodes[d.source.id ?? d.source].x)
        .attr('y1', d => nodes[d.source.id ?? d.source].y)
        .attr('x2', d => nodes[d.target.id ?? d.target].x)
        .attr('y2', d => nodes[d.target.id ?? d.target].y);
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  window._nodeSel = nodeSel;
  window._linkSel = linkSel;
  window._rScale = rScale;
  window._cycleNodes = cycleNodes;
}

function updateGraph() {
  buildGraph();
}

function updateNodeColors() {
  if (!window._nodeSel) return;
  const md = getModelData();
  const inDeg = new Array(G.images.length).fill(0);
  md.nn_map.forEach(t => inDeg[t]++);
  const maxHub = Math.max(...inDeg, 1);
  const maxTau = Math.max(...G.images.map((_, i) => {
    const c = md.chains[String(i)];
    return c ? c.transient_length : 0;
  }), 1);

  const tauColor = d3.scaleSequential(d3.interpolateViridis).domain([0, maxTau]);
  const hubColor = d3.scaleSequential(d3.interpolateOrRd).domain([0, maxHub]);

  window._nodeSel.select('circle.node-circle')
    .attr('fill', d => {
      if (colorMode === 'class') return CLASS_COLORS[d.clsIdx % CLASS_COLORS.length];
      if (colorMode === 'tau') return tauColor(d.tau);
      return hubColor(d.hub);
    });
}

// ── Tooltip ──────────────────────────────────────────────────────────────────

function onNodeHover(event, d) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-img').src = d.thumbnail;
  document.getElementById('tt-class').textContent = d.cls;
  document.getElementById('tt-hub').textContent = `Hub score: ${d.hub}`;
  document.getElementById('tt-path').textContent = d.path;
  tt.style.display = 'block';
}

function onNodeMouseMove(event) {
  const tt = document.getElementById('tooltip');
  const cont = document.getElementById('graph-container');
  const rect = cont.getBoundingClientRect();
  let x = event.clientX - rect.left + 12;
  let y = event.clientY - rect.top + 12;
  if (x + 190 > rect.width) x -= 200;
  if (y + 120 > rect.height) y -= 130;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function onNodeOut() {
  document.getElementById('tooltip').style.display = 'none';
}

// ── Click / Chain Animation ──────────────────────────────────────────────────

let selectedNodeId = null;

function onNodeClick(event, d) {
  event.stopPropagation();
  if (animTimeout) clearTimeout(animTimeout);
  selectedNodeId = d.id;

  const md = getModelData();
  const chain = md.chains[String(d.id)];
  if (!chain) return;

  const chainSeq = chain.chain;
  const cycleEntry = chain.cycle_entry_node;
  const chainSet = new Set(chainSeq);

  // Fade non-chain nodes
  window._nodeSel.select('circle.node-circle')
    .attr('opacity', nd => chainSet.has(nd.id) ? 1.0 : 0.12);
  window._nodeSel.select('circle.node-ring')
    .attr('opacity', nd => chainSet.has(nd.id) ? 1.0 : 0.12);
  window._linkSel.attr('opacity', 0.05);

  // Animate step by step
  let step = 0;
  function animStep() {
    if (step >= chainSeq.length) return;
    const nid = chainSeq[step];
    window._nodeSel.filter(nd => nd.id === nid)
      .select('circle.node-circle')
      .attr('stroke', '#fff')
      .attr('stroke-width', 2)
      .transition().duration(300)
      .attr('stroke-width', 0);
    step++;
    if (step < chainSeq.length) {
      animTimeout = setTimeout(animStep, 400);
    }
  }
  animStep();

  // Chain inspector
  showChainInspector(d.id, chain);

  // Reset on background click
  d3.select('#graph').on('click.reset', () => {
    clearSelection();
    d3.select('#graph').on('click.reset', null);
  });
}

function clearSelection() {
  if (animTimeout) clearTimeout(animTimeout);
  selectedNodeId = null;
  window._nodeSel.select('circle.node-circle').attr('opacity', 1).attr('stroke', 'none');
  window._nodeSel.select('circle.node-ring').attr('opacity', 1);
  window._linkSel.attr('opacity', 0.6);
  document.getElementById('chain-inspector').innerHTML = '<span class="ci-empty">Click a node to inspect its chain.</span>';
}

function showChainInspector(nodeId, chain) {
  const ci = document.getElementById('chain-inspector');
  ci.innerHTML = '';

  const chainSeq = chain.chain;
  const cycleEntry = chain.cycle_entry_node;
  const tau = chain.transient_length;
  const len = chain.cycle_length;

  // Show up to 12 nodes to avoid overflow; truncate in middle if needed
  const maxShow = 12;
  let displaySeq = chainSeq;
  let truncated = false;
  if (chainSeq.length > maxShow) {
    displaySeq = [...chainSeq.slice(0, 5), -1, ...chainSeq.slice(-5)];
    truncated = true;
  }

  displaySeq.forEach((nid, idx) => {
    if (nid === -1) {
      const el = document.createElement('div');
      el.className = 'chain-arrow';
      el.textContent = '…';
      ci.appendChild(el);
      return;
    }

    const img = G.images[nid];
    if (!img) return;

    const isCycleNode = nid === cycleEntry || (chain.cycle_nodes && chain.cycle_nodes.includes(nid));
    const isActive = nid === nodeId;

    const wrap = document.createElement('div');
    wrap.className = 'chain-node' + (isCycleNode ? ' cycle-node' : '') + (isActive ? ' active' : '');

    const imgEl = document.createElement('img');
    imgEl.src = img.thumbnail;
    imgEl.title = img.path;
    wrap.appendChild(imgEl);

    const label = document.createElement('div');
    label.style.cssText = 'font-size:9px;color:var(--text-muted);max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;';
    label.textContent = img.class;
    wrap.appendChild(label);

    ci.appendChild(wrap);

    // Arrow (not after last)
    if (idx < displaySeq.length - 1 && displaySeq[idx + 1] !== -1) {
      const arrow = document.createElement('div');
      arrow.className = 'chain-arrow';
      arrow.textContent = '→';
      ci.appendChild(arrow);
    }

    // Cycle marker after cycle entry
    if (nid === cycleEntry && idx === displaySeq.length - 1) {
      const mark = document.createElement('div');
      mark.className = 'chain-cycle-marker';
      mark.textContent = '↻';
      ci.appendChild(mark);
    }
  });

  // Meta info
  const meta = document.createElement('div');
  meta.className = 'chain-meta';
  const agreeStr = getAgreement(nodeId);
  meta.innerHTML = `τ=<span>${tau}</span>  ℓ=<span>${len === -1 ? '?' : len}</span>  ${agreeStr}`;
  ci.appendChild(meta);
}

function getAgreement(nodeId) {
  if (!G.dinov2 || !G.clip) return '';
  const nn_d = G.dinov2.nn_map[nodeId];
  const nn_c = G.clip.nn_map[nodeId];
  const agree = nn_d === nn_c;
  return `NN agrees: <span style="color:${agree ? '#2ecc71' : '#e74c3c'}">${agree ? 'Yes' : 'No'}</span>`;
}

// ── Stats Panel ──────────────────────────────────────────────────────────────

function updateStats() {
  const md = getModelData();
  const stats = md.stats;
  if (!stats) return;

  drawHistogram('#chart-tau', stats.transient, 'τ');
  drawHistogram('#chart-cyc', stats.cycle_length, 'ℓ');
  drawHubHistogram('#chart-hub', stats.hub);
  drawHubGallery(md);
}

function drawHistogram(sel, data, label) {
  const svg = d3.select(sel);
  svg.selectAll('*').remove();
  if (!data || !data.histogram || !data.histogram.counts) return;

  const counts = data.histogram.counts;
  const edges = data.histogram.bin_edges;
  if (!counts.length) return;

  const W = 276, H = 100, margin = { top: 4, right: 8, bottom: 20, left: 28 };
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleBand()
    .domain(d3.range(counts.length))
    .range([0, w])
    .padding(0.1);

  const y = d3.scaleLinear()
    .domain([0, d3.max(counts)])
    .range([h, 0]);

  const axisColor = getThemeColor('--axis-line');
  const axisText = getThemeColor('--axis-text');
  const barColor = getThemeColor('--hist-bar');

  g.append('g').attr('transform', `translate(0,${h})`)
    .call(d3.axisBottom(x).tickValues(x.domain().filter((_, i) => i % Math.ceil(counts.length / 6) === 0)).tickFormat(i => Math.round(edges[i])))
    .call(g => g.select('.domain').attr('stroke', axisColor))
    .call(g => g.selectAll('.tick line').attr('stroke', axisColor))
    .call(g => g.selectAll('.tick text').attr('fill', axisText).attr('font-size', 9));

  g.append('g')
    .call(d3.axisLeft(y).ticks(3))
    .call(g => g.select('.domain').attr('stroke', axisColor))
    .call(g => g.selectAll('.tick line').attr('stroke', axisColor))
    .call(g => g.selectAll('.tick text').attr('fill', axisText).attr('font-size', 9));

  g.selectAll('rect')
    .data(counts)
    .join('rect')
    .attr('x', (_, i) => x(i))
    .attr('y', d => y(d))
    .attr('width', x.bandwidth())
    .attr('height', d => h - y(d))
    .attr('fill', barColor)
    .attr('opacity', 0.85);

  svg.append('text').attr('x', W / 2).attr('y', H - 2)
    .attr('text-anchor', 'middle').attr('fill', axisText).attr('font-size', 9)
    .text(label);
}

function drawHubHistogram(sel, hubData) {
  const svg = d3.select(sel);
  svg.selectAll('*').remove();
  if (!hubData || !hubData.in_degree) return;

  const inDeg = hubData.in_degree;
  const W = 276, H = 100, margin = { top: 4, right: 8, bottom: 20, left: 32 };
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  // Bin by value
  const maxDeg = Math.max(...inDeg);
  const bins = new Array(maxDeg + 1).fill(0);
  inDeg.forEach(d => bins[d]++);
  // Remove zero-degree leading zeros for display
  const nonZero = bins.map((count, deg) => ({ deg, count })).filter(d => d.count > 0);

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleBand()
    .domain(nonZero.map(d => d.deg))
    .range([0, w])
    .padding(0.1);

  const maxCount = Math.max(...nonZero.map(d => d.count), 1);
  const y = d3.scaleLog()
    .domain([0.5, maxCount * 1.5])
    .range([h, 0])
    .clamp(true);

  const axisColorH = getThemeColor('--axis-line');
  const axisTextH = getThemeColor('--axis-text');
  const hubBarColor = getThemeColor('--hist-hub');

  g.append('g').attr('transform', `translate(0,${h})`)
    .call(d3.axisBottom(x).tickValues(x.domain().filter((_, i) => i % Math.ceil(nonZero.length / 5) === 0)))
    .call(g => g.select('.domain').attr('stroke', axisColorH))
    .call(g => g.selectAll('.tick line').attr('stroke', axisColorH))
    .call(g => g.selectAll('.tick text').attr('fill', axisTextH).attr('font-size', 9));

  g.append('g')
    .call(d3.axisLeft(y).ticks(3, '~s'))
    .call(g => g.select('.domain').attr('stroke', axisColorH))
    .call(g => g.selectAll('.tick line').attr('stroke', axisColorH))
    .call(g => g.selectAll('.tick text').attr('fill', axisTextH).attr('font-size', 9));

  g.selectAll('rect')
    .data(nonZero)
    .join('rect')
    .attr('x', d => x(d.deg))
    .attr('y', d => y(Math.max(d.count, 0.5)))
    .attr('width', x.bandwidth())
    .attr('height', d => h - y(Math.max(d.count, 0.5)))
    .attr('fill', hubBarColor)
    .attr('opacity', 0.85);

  svg.append('text').attr('x', W / 2).attr('y', H - 2)
    .attr('text-anchor', 'middle').attr('fill', axisTextH).attr('font-size', 9)
    .text('in-degree (log)');
}

function drawHubGallery(md) {
  const gallery = document.getElementById('hub-gallery');
  gallery.innerHTML = '';
  if (!md.stats || !md.stats.hub || !md.stats.hub.in_degree) return;

  const inDeg = md.stats.hub.in_degree;
  const ranked = inDeg.map((d, i) => ({ i, d })).sort((a, b) => b.d - a.d).slice(0, 10);

  ranked.forEach(({ i, d }) => {
    const img = G.images[i];
    if (!img) return;

    const wrap = document.createElement('div');
    wrap.className = 'hub-thumb';
    wrap.title = `${img.path}\nHub score: ${d}`;

    const imgEl = document.createElement('img');
    imgEl.src = img.thumbnail;
    wrap.appendChild(imgEl);

    const score = document.createElement('div');
    score.className = 'hub-score';
    score.textContent = d;
    wrap.appendChild(score);

    wrap.addEventListener('click', () => {
      const nd = nodeById[i];
      if (nd) onNodeClick({ stopPropagation: () => {} }, nd);
    });

    gallery.appendChild(wrap);
  });
}

})();
